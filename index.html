<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./script.js" defer></script>
</head>
<body>


    <div class="topbar">
        <h1>Kale's Library</h1>
    </div>
    <div class="card-container" id="card-container">
        <div class="card">
            <button class="close"></button>
            <h2 class="title">The Great Gatsby</h2>
            <p class="author">F. Scott Fitzgerald</p>
            <p class="page-count">240</p>
            <button class="status read"></button>
        </div>

        <div class="pseudocard" id="add-card">
            <button class="add-card-btn"></button>
            <dialog>
                <form method="dialog">

                    <button class="close" type="button"></button>

                    <label class="floating-label" for="title">
                        <input required type="text" name="title" id="title" placeholder="Title">
                    </label>

                    <label class="floating-label" for="author">
                        <input required type="text" name="author" id="author" placeholder="Author">
                    </label>

                    <label class="floating-label" for="pages">
                        <input required type="number" name="pages" id="pages" placeholder="Page count">
                    </label>

                    <label for="read">
                        Read
                        <input type="checkbox" name="read" id="read">
                    </label>

                    <button class="confirm" type="submit">confirm</button>

                </form>
            </dialog>
        </div>

    </div>

<template id="card-template">
    <div class="card">
        <button class="close"></button>
        <h2 class="title"></h2>
        <p class="author"></p>
        <p class="page-count"></p>
        <button class="status"></button>
    </div>
</template>
</body>
</html>
